<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dad Chat Control</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

:root { color-scheme: dark; }

body{
font-family:Arial;
background:#111;
color:#fff;
max-width:560px;
margin:auto;
padding:18px;
}

h2{margin:6px 0 10px;}

label{display:block;margin-top:10px;color:#ddd;}

input,textarea{
width:100%;
padding:10px;
margin-top:6px;
font-size:16px;
border-radius:8px;
border:1px solid #333;
background:#1b1b1b;
color:#fff;
}

textarea{resize:vertical;min-height:80px;}

button{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:10px;
color:#fff;
background:#2ecc71;
margin-top:12px;
}

button.secondary{
background:#444;
}

.row{
display:flex;
gap:10px;
}

.row>div{
flex:1;
}

.controls{
display:flex;
gap:10px;
margin-top:10px;
}

.controls button{
margin-top:0;
}

#status{
padding:10px;
border-radius:10px;
background:#222;
margin:10px 0 14px 0;
white-space:pre-wrap;
font-size:14px;
}

#lockScreen{
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
display:flex;
align-items:center;
justify-content:center;
padding:18px;
}

#lockBox{
width:100%;
max-width:420px;
background:#151515;
border:1px solid #2a2a2a;
border-radius:14px;
padding:18px;
}

table{
width:100%;
border-collapse:collapse;
background:#1a1a1a;
border:1px solid #2a2a2a;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:10px;
border-bottom:1px solid #2a2a2a;
}

th{
text-align:left;
background:#222;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
display:inline-block;
background:#666;
margin-right:6px;
}

</style>

</head>

<body>

<div id="lockScreen">
<div id="lockBox">

<h2>Dad Chat Locked</h2>

<label>Password</label>
<input id="pw" type="password">

<button onclick="unlock()">Unlock</button>

</div>
</div>

<h2>Dad Chat</h2>

<div id="status">

Status: Locked

<div>
<span id="devDot" class="dot"></span>
<span id="devText">Device: Unknown</span>
</div>

</div>

<div class="controls">

<button class="secondary" onclick="requestNotify()">Enable Notifications</button>

<button class="secondary" onclick="clearResponses()">Clear Responses</button>

<button class="secondary" onclick="clearFields()">Clear Fields</button>

</div>

<label>Title</label>
<input id="title">

<label>Message</label>
<textarea id="message"></textarea>

<div class="row">

<div>
<label>Button 1</label>
<input id="b1">
</div>

<div>
<label>Button 2</label>
<input id="b2">
</div>

<div>
<label>Button 3</label>
<input id="b3">
</div>

</div>

<button onclick="send()">SEND</button>

<h3 style="margin-top:14px;">Responses</h3>

<table>

<thead>
<tr>
<th style="width:65%">Message</th>
<th style="width:35%">Response</th>
</tr>
</thead>

<tbody id="responsesBody"></tbody>

</table>

<script>

/* ================= SETTINGS ================= */

const PAGE_PASSWORD = "Toronto123"

const brokerUrl =
"wss://b1dcdceb082d4443873bb186cd006f90.s1.eu.hivemq.cloud:8884/mqtt"

const room = "dadchat/room1"

const topicResponse = room+"/response"
const topicOnline   = room+"/online"
const topicRequest  = room+"/request"

/* ===== MQTT USER ===== */

const options = {

username:"MLDS_CHAT2",
password:"Tonka123",

protocolVersion:4,
clean:true,
reconnectPeriod:2000,
connectTimeout:8000,

clientId:"dadchat-web-"+Math.random().toString(16).slice(2)

}

/* ================= UI HELPERS ================= */

function STATUS(t){

const s=document.getElementById("status")
const badge=s.querySelector("div")
s.textContent=t
s.appendChild(badge)

}

function escapeHtml(s){

return String(s)
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;")

}

/* ================= DEVICE STATUS ================= */

function setDeviceStatus(on){

const dot=document.getElementById("devDot")
const txt=document.getElementById("devText")

dot.style.background=on?"#2ecc71":"#e74c3c"
txt.textContent="Device: "+(on?"Online":"Offline")

}

/* ================= PASSWORD ================= */

function unlock(){

if(document.getElementById("pw").value!==PAGE_PASSWORD){
alert("Wrong password")
return
}

sessionStorage.setItem("dadchat_unlocked","1")

document.getElementById("lockScreen").style.display="none"

STATUS("Status: Connecting")

startMqtt()

}

if(sessionStorage.getItem("dadchat_unlocked")==="1"){

document.getElementById("lockScreen").style.display="none"

startMqtt()

}

/* ================= NOTIFICATIONS ================= */

async function requestNotify(){

if(!("Notification" in window)){
alert("Notifications unsupported")
return
}

await Notification.requestPermission()

}

function notify(title,body){

if(Notification.permission==="granted")
new Notification(title,{body})

}

/* ================= RESPONSE STORAGE ================= */

const STORE_KEY="dadchat_responses"

function loadResponses(){

const raw=localStorage.getItem(STORE_KEY)

if(!raw)return

const arr=JSON.parse(raw)

arr.reverse().forEach(r=>addRow(r.q,r.a,false))

}

function saveResponse(q,a){

const raw=localStorage.getItem(STORE_KEY)
const arr=raw?JSON.parse(raw):[]

arr.push({q,a})

localStorage.setItem(STORE_KEY,JSON.stringify(arr))

}

function clearResponses(){

localStorage.removeItem(STORE_KEY)

document.getElementById("responsesBody").innerHTML=""

}

function addRow(q,a,persist=true){

const tbody=document.getElementById("responsesBody")

const tr=document.createElement("tr")

tr.innerHTML=`<td>${escapeHtml(q)}</td><td>${escapeHtml(a)}</td>`

tbody.prepend(tr)

if(persist)saveResponse(q,a)

}

/* ================= CLEAR FIELDS ================= */

function clearFields(){

document.getElementById("message").value=""
document.getElementById("b1").value=""
document.getElementById("b2").value=""
document.getElementById("b3").value=""

}

/* ================= MQTT ================= */

let client=null

function startMqtt(){

document.getElementById("title").value="Dad Chat"

loadResponses()

STATUS("Connecting to HiveMQ")

client=mqtt.connect(brokerUrl,options)

client.on("connect",()=>{

STATUS("Connected")

client.subscribe(topicResponse)
client.subscribe(topicOnline)
client.subscribe(topicRequest)

})

client.on("message",(topic,msg)=>{

const raw=msg.toString()

if(topic===topicOnline){

setDeviceStatus(raw==="online")

return

}

if(topic===topicRequest){

notify("Dad Chat","Dad requested a message")

return

}

if(topic===topicResponse){

let q=raw
let a=""

try{

const j=JSON.parse(raw)

q=j.q
a=j.a

}catch{}

addRow(q,a,true)

notify("Dad Chat Response",a)

}

})

}

/* ================= SEND ================= */

function send(){

if(!client||!client.connected){
STATUS("Not connected")
return
}

const title=document.getElementById("title").value
const msg=document.getElementById("message").value

const b1=document.getElementById("b1").value
const b2=document.getElementById("b2").value
const b3=document.getElementById("b3").value

client.publish(room+"/title",title)
client.publish(room+"/message",msg)
client.publish(room+"/buttons",`${b1}|${b2}|${b3}`)

STATUS("Sent")

}

</script>

</body>
</html>
