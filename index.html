<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dad Chat Control</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    :root { color-scheme: dark; }
    body { font-family: Arial, sans-serif; background:#111; color:#fff; max-width: 560px; margin: 0 auto; padding: 18px; }
    h2 { margin: 6px 0 10px; }
    label { display:block; margin-top: 10px; color:#ddd; }
    input, textarea {
      width:100%; padding:10px; margin-top:6px;
      font-size:16px; border-radius:8px; border:1px solid #333;
      background:#1b1b1b; color:#fff;
    }
    textarea { resize: vertical; min-height: 80px; }
    button {
      width:100%; padding:14px; font-size:18px; border:none;
      border-radius:10px; color:#fff; background:#2ecc71; margin-top: 12px;
    }
    button.secondary { background:#444; }
    .row { display:flex; gap:10px; }
    .row > div { flex:1; }
    #status {
      padding:10px; border-radius:10px; background:#222;
      margin: 10px 0 14px 0; white-space: pre-wrap; font-size: 14px;
    }
    #lockScreen {
      position: fixed; inset:0; background: rgba(0,0,0,.92);
      display:flex; align-items:center; justify-content:center; padding: 18px;
    }
    #lockBox {
      width:100%; max-width:420px; background:#151515; border:1px solid #2a2a2a;
      border-radius:14px; padding:18px;
      box-shadow: 0 10px 30px rgba(0,0,0,.55);
    }
    #lockBox p { color:#bbb; margin-top: 6px; }
    table {
      width:100%; border-collapse: collapse; background:#1a1a1a;
      border:1px solid #2a2a2a; border-radius: 10px; overflow:hidden;
    }
    th, td { padding:10px; border-bottom:1px solid #2a2a2a; vertical-align: top; }
    th { text-align:left; background:#222; color:#ddd; position: sticky; top: 0; }
    tr:last-child td { border-bottom:none; }
    .tiny { font-size: 12px; color:#aaa; margin-top: 8px; }
    .pill { display:inline-block; padding:4px 8px; border-radius: 999px; background:#2a2a2a; font-size: 12px; color:#ddd; }
    .controls { display:flex; gap:10px; margin-top: 10px; }
    .controls button { margin-top:0; }
    .badge { display:inline-flex; align-items:center; gap:8px; margin-top:8px; }
    .dot { width:10px; height:10px; border-radius:50%; background:#666; display:inline-block; }
  </style>
</head>

<body>

<!-- Password Gate -->
<div id="lockScreen">
  <div id="lockBox">
    <h2>Dad Chat Locked</h2>
    <p>Enter the password to access controls.</p>
    <label>Password</label>
    <input id="pw" type="password" placeholder="Password">
    <button onclick="unlock()">Unlock</button>
  </div>
</div>

<h2>Dad Chat</h2>

<div id="status">
  Status: Locked
  <div class="badge">
    <span id="devDot" class="dot"></span>
    <span id="devText">Device: Unknown</span>
  </div>
</div>

<div class="controls">
  <button class="secondary" onclick="requestNotify()">Enable Notifications</button>
  <button class="secondary" onclick="clearResponses()">Clear Responses</button>
</div>

<label>Title</label>
<input id="title" placeholder="DAD CHAT">

<label>Message</label>
<textarea id="message" placeholder="Type message…"></textarea>

<div class="row">
  <div>
    <label>Button 1</label>
    <input id="b1" placeholder="On it">
  </div>
  <div>
    <label>Button 2</label>
    <input id="b2" placeholder="In 5 mins">
  </div>
  <div>
    <label>Button 3</label>
    <input id="b3" placeholder="Can't right now">
  </div>
</div>

<button onclick="send()">SEND</button>
<div class="tiny">
  Publishes to <span class="pill">dadchat/room1/title</span> <span class="pill">message</span> <span class="pill">buttons</span>
</div>

<h3 style="margin:14px 0 8px;">Responses</h3>
<table>
  <thead>
    <tr><th style="width:65%;">Message</th><th style="width:35%;">Response</th></tr>
  </thead>
  <tbody id="responsesBody"></tbody>
</table>

<script>
  // ======= YOUR SETTINGS =======
  const PAGE_PASSWORD = "Toronto123";

  const brokerUrl = "wss://b1dcdceb082d4443873bb186cd006f90.s1.eu.hivemq.cloud:8884/mqtt";
  const room = "dadchat/room1";

  const topicResponse = room + "/response";
  const topicOnline   = room + "/online";
  const topicRequest  = room + "/request";

  // Use a restricted HiveMQ user if possible
  const options = {
    username: "MLDS_CHAT2",
    password: "Tonka123",
    protocolVersion: 4,
    clean: true,
    reconnectPeriod: 2000,
    connectTimeout: 8000,
    clientId: "dadchat-web-" + Math.random().toString(16).slice(2)
  };

  // ======= UI helpers =======
  const STATUS = (t) => {
    const s = document.getElementById("status");
    // keep device badge intact
    const badge = s.querySelector(".badge");
    s.textContent = t;
    s.appendChild(badge);
  };

  function escapeHtml(s) {
    return String(s)
      .replaceAll("&","&amp;").replaceAll("<","&lt;")
      .replaceAll(">","&gt;").replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function setDeviceStatus(isOnline, extra="") {
    const dot = document.getElementById("devDot");
    const txt = document.getElementById("devText");
    dot.style.background = isOnline ? "#2ecc71" : "#e74c3c";
    txt.textContent = "Device: " + (isOnline ? "Online" : "Offline") + (extra ? (" ("+extra+")") : "");
  }

  // ======= Password gate =======
  function unlock() {
    const pw = document.getElementById("pw").value || "";
    if (pw !== PAGE_PASSWORD) { alert("Wrong password"); return; }
    sessionStorage.setItem("dadchat_unlocked", "1");
    document.getElementById("lockScreen").style.display = "none";
    STATUS("Status: Unlocked (connecting…)");
    startMqtt();
  }

  if (sessionStorage.getItem("dadchat_unlocked") === "1") {
    document.getElementById("lockScreen").style.display = "none";
    STATUS("Status: Unlocked (connecting…)");
    startMqtt();
  }

  // ======= Notifications =======
  async function requestNotify() {
    if (!("Notification" in window)) { alert("Notifications not supported."); return; }
    const perm = await Notification.requestPermission();
    alert(perm === "granted" ? "Notifications enabled." : "Notifications not enabled.");
  }

  function notify(title, body) {
    try {
      if ("Notification" in window && Notification.permission === "granted") {
        new Notification(title, { body });
      }
    } catch (e) {}
  }

  // ======= Persistent responses =======
  const STORE_KEY = "dadchat_responses_v1";
  const MAX_ROWS = 80;

  function loadStoredResponses() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (!raw) return;
      const arr = JSON.parse(raw);
      if (!Array.isArray(arr)) return;
      // oldest->newest; we render newest first so reverse iterate
      for (let i = arr.length - 1; i >= 0; i--) {
        addResponseRow(arr[i].q, arr[i].a, false);
      }
    } catch (e) {}
  }

  function saveResponse(q, a) {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      const arr = raw ? JSON.parse(raw) : [];
      const next = Array.isArray(arr) ? arr : [];
      next.push({ q, a, ts: Date.now() });
      while (next.length > MAX_ROWS) next.shift();
      localStorage.setItem(STORE_KEY, JSON.stringify(next));
    } catch (e) {}
  }

  function clearResponses() {
    localStorage.removeItem(STORE_KEY);
    document.getElementById("responsesBody").innerHTML = "";
  }

  function addResponseRow(q, a, persist=true) {
    const tbody = document.getElementById("responsesBody");
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${escapeHtml(q)}</td><td>${escapeHtml(a)}</td>`;
    tbody.prepend(tr);
    if (persist) saveResponse(q, a);
  }

  // ======= MQTT =======
  let client = null;
  let onlineWatchdog = null;

  function startMqtt() {
    if (client) return;

    setDeviceStatus(false, "waiting…");
    loadStoredResponses();

    STATUS("Status: Connecting to HiveMQ…");
    client = mqtt.connect(brokerUrl, options);

    client.on("connect", () => {
      STATUS("Status: ✅ Connected\nSubscribed: response + online + request");
      client.subscribe(topicResponse, { qos: 1 });
      client.subscribe(topicOnline,   { qos: 1 });
      client.subscribe(topicRequest,  { qos: 1 });
    });

    client.on("reconnect", () => STATUS("Status: Reconnecting…"));
    client.on("close", () => STATUS("Status: Disconnected (socket closed)"));
    client.on("offline", () => STATUS("Status: Offline"));
    client.on("error", (err) => STATUS("Status: ❌ Error\n" + (err?.message || err)));

    // If we don't hear "online" within 20s, show offline (covers edge cases)
    if (!onlineWatchdog) {
      onlineWatchdog = setInterval(() => {
        // no-op; status is driven by retained online/offline normally
      }, 10000);
    }

    client.on("message", (topic, msg) => {
      const raw = msg.toString();

      if (topic === topicOnline) {
        const v = raw.trim().toLowerCase();
        setDeviceStatus(v === "online");
        return;
      }

      if (topic === topicRequest) {
        // Dad pressed “Send me a Message”
        notify("Dad Chat", "Dad pressed: Send me a Message");
        return;
      }

      if (topic === topicResponse) {
        let q = raw, a = "";
        try {
          const obj = JSON.parse(raw);
          q = obj.q ?? raw;
          a = obj.a ?? "";
        } catch (e) { /* not JSON */ }

        addResponseRow(q, a, true);
        notify("Dad Chat Response", a ? `Response: ${a}` : "New response received");
      }
    });
  }

  // ======= Send controls =======
  function send() {
    if (!client || !client.connected) { STATUS("Status: ❌ Not connected — can’t send yet."); return; }

    const title = document.getElementById("title").value || "";
    const msg   = document.getElementById("message").value || "";
    const b1 = document.getElementById("b1").value || "";
    const b2 = document.getElementById("b2").value || "";
    const b3 = document.getElementById("b3").value || "";

    client.publish(room + "/title", title,   { qos: 1 });
    client.publish(room + "/message", msg,   { qos: 1 });
    client.publish(room + "/buttons", `${b1}|${b2}|${b3}`, { qos: 1 });

    STATUS("Status: ✅ Sent update");
  }
</script>

</body>
</html>
