<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dad Chat Control</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
:root { color-scheme: dark; }
body{font-family:Arial, sans-serif;background:#111;color:#fff;max-width:560px;margin:auto;padding:18px;}
h2{margin:6px 0 10px;}
label{display:block;margin-top:10px;color:#ddd;}
input,textarea{width:100%;padding:10px;margin-top:6px;font-size:16px;border-radius:8px;border:1px solid #333;background:#1b1b1b;color:#fff;}
textarea{resize:vertical;min-height:80px;}
button{width:100%;padding:14px;font-size:18px;border:none;border-radius:10px;color:#fff;background:#2ecc71;margin-top:12px;}
button.secondary{background:#444;}
.row{display:flex;gap:10px;}
.row>div{flex:1;}
.controls{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
.controls button{margin-top:0;flex:1 1 160px;}
#status{padding:10px;border-radius:10px;background:#222;margin:10px 0 14px 0;white-space:pre-wrap;font-size:14px;}
#lockScreen{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;padding:18px;z-index:9999;}
#lockBox{width:100%;max-width:420px;background:#151515;border:1px solid #2a2a2a;border-radius:14px;padding:18px;}
table{width:100%;border-collapse:collapse;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;overflow:hidden;}
th,td{padding:10px;border-bottom:1px solid #2a2a2a;vertical-align:top;}
th{text-align:left;background:#222;color:#ddd;}
tr:last-child td{border-bottom:none;}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;background:#666;margin-right:6px;}

#requestBanner{
  display:none;
  background:#ff9f0a;
  color:#111;
  border-radius:12px;
  padding:12px 12px;
  margin: 10px 0 12px 0;
  box-shadow: 0 10px 30px rgba(0,0,0,.25);
}
#requestBanner strong{display:block;font-size:16px;margin-bottom:4px;}
#requestBanner .meta{font-size:13px;opacity:0.9;}
#requestBanner .bannerRow{display:flex;align-items:center;justify-content:space-between;gap:10px;}
#requestBanner button{width:auto;margin:0;padding:10px 12px;font-size:14px;background:#111;color:#fff;border-radius:10px;}
</style>
</head>

<body>

<div id="lockScreen">
  <div id="lockBox">
    <h2>Dad Chat Locked</h2>
    <label>Password</label>
    <input id="pw" type="password">
    <button onclick="unlock()">Unlock</button>
  </div>
</div>

<h2>Dad Chat</h2>

<div id="requestBanner">
  <div class="bannerRow">
    <div>
      <strong>⚠ Dad requested a message</strong>
      <div class="meta" id="requestTimeText">Time: —</div>
    </div>
    <button onclick="dismissRequest()">Dismiss</button>
  </div>
</div>

<div id="status">
Status: Locked
<div>
  <span id="devDot" class="dot"></span>
  <span id="devText">Device: Unknown</span>
</div>
</div>

<div class="controls">
  <button class="secondary" onclick="requestNotify()">Enable Notifications</button>
  <button class="secondary" onclick="clearHistory()">Clear History (local)</button>
  <button class="secondary" onclick="clearFields()">Clear Fields</button>
</div>

<label>Title</label>
<input id="title">

<label>Message</label>
<textarea id="message"></textarea>

<div class="row">
  <div><label>Button 1</label><input id="b1"></div>
  <div><label>Button 2</label><input id="b2"></div>
  <div><label>Button 3</label><input id="b3"></div>
</div>

<button onclick="send()">SEND</button>

<h3 style="margin-top:14px;">History</h3>
<table>
  <thead>
    <tr><th style="width:65%">Message</th><th style="width:35%">Response</th></tr>
  </thead>
  <tbody id="responsesBody"></tbody>
</table>

<script>
const PAGE_PASSWORD = "Toronto123";

const brokerUrl =
"wss://b1dcdceb082d4443873bb186cd006f90.s1.eu.hivemq.cloud:8884/mqtt";

const room = "dadchat/room1";
const topicTitle    = room + "/title";
const topicMessage  = room + "/message";
const topicButtons  = room + "/buttons";
const topicOnline   = room + "/online";
const topicRequest  = room + "/request";
const topicHistory  = room + "/history";

const options = {
  username: "MLDS_CHAT2",
  password: "Tonka123",
  protocolVersion: 4,
  clean: true,
  reconnectPeriod: 2000,
  connectTimeout: 8000,
  clientId: "dadchat-web-" + Math.random().toString(16).slice(2)
};

const LOGIN_KEY = "dadchat_login_v1";
const LOGIN_TTL_MS = 7 * 24 * 60 * 60 * 1000; // 7 days

function STATUS(t){
  const s=document.getElementById("status");
  const badge=s.querySelector("div");
  s.textContent=t;
  s.appendChild(badge);
}

function escapeHtml(s){
  return String(s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function formatTime(ts){
  try{
    const d=new Date(ts);
    return d.toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
  }catch{ return ""; }
}

function setDeviceStatus(on){
  const dot=document.getElementById("devDot");
  const txt=document.getElementById("devText");
  dot.style.background=on?"#2ecc71":"#e74c3c";
  txt.textContent="Device: "+(on?"Online":"Offline");
}

/* ================= LOGIN PERSISTENCE ================= */
function saveLogin(){
  try{
    localStorage.setItem(LOGIN_KEY, JSON.stringify({
      ts: Date.now()
    }));
  }catch(e){}
}

function clearLogin(){
  try{ localStorage.removeItem(LOGIN_KEY); }catch(e){}
}

function loginStillValid(){
  try{
    const raw = localStorage.getItem(LOGIN_KEY);
    if(!raw) return false;
    const obj = JSON.parse(raw);
    if(!obj || !obj.ts) return false;
    return (Date.now() - obj.ts) < LOGIN_TTL_MS;
  }catch(e){
    return false;
  }
}

function unlock(){
  if(document.getElementById("pw").value!==PAGE_PASSWORD){
    alert("Wrong password");
    return;
  }
  saveLogin();
  document.getElementById("lockScreen").style.display="none";
  STATUS("Status: Connecting…");
  startMqtt();
}

if(loginStillValid()){
  document.getElementById("lockScreen").style.display="none";
  startMqtt();
}

/* ================= NOTIFICATIONS ================= */
async function requestNotify(){
  if(!("Notification" in window)){
    alert("Notifications unsupported in this browser");
    return;
  }

  const permission = await Notification.requestPermission();

  if(permission === "granted"){
    alert("Notifications enabled");
  } else {
    alert("Notifications not allowed");
  }
}

function notify(title, body){
  try{
    if("Notification" in window && Notification.permission === "granted"){
      new Notification(title, { body });
    }
  }catch(e){}
}

/* ================= REQUEST BANNER ================= */
const REQ_KEY="dadchat_request_state_v4";

function saveRequest(ts){
  try{ localStorage.setItem(REQ_KEY, JSON.stringify({ts})); }catch(e){}
}

function loadRequest(){
  try{
    const raw=localStorage.getItem(REQ_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}

function showRequestBanner(ts){
  document.getElementById("requestTimeText").textContent="Time: " + formatTime(ts);
  document.getElementById("requestBanner").style.display="block";
}

function hideRequestBanner(){
  document.getElementById("requestBanner").style.display="none";
}

function applySavedRequest(){
  const st=loadRequest();
  if(st && st.ts) showRequestBanner(st.ts);
}

function dismissRequest(){
  try{ localStorage.removeItem(REQ_KEY);}catch(e){}
  hideRequestBanner();
  if(client && client.connected){
    client.publish(topicRequest, "", {qos:1, retain:true});
  }
}

/* ================= HISTORY ================= */
const HIST_KEY="dadchat_history_cache_v2";
let lastHistoryJson = "";

function cacheHistory(arr){
  try{ localStorage.setItem(HIST_KEY, JSON.stringify(arr)); }catch(e){}
}

function loadCachedHistory(){
  try{
    const raw=localStorage.getItem(HIST_KEY);
    if(!raw) return null;
    const arr=JSON.parse(raw);
    return Array.isArray(arr)?arr:null;
  }catch(e){ return null; }
}

function renderHistory(arr){
  const tbody=document.getElementById("responsesBody");
  tbody.innerHTML="";
  for(const item of arr){
    const q=item.q ?? "";
    const a=item.a ?? "";
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${escapeHtml(q)}</td><td>${escapeHtml(a)}</td>`;
    tbody.appendChild(tr);
  }
}

function clearHistory(){
  try{ localStorage.removeItem(HIST_KEY);}catch(e){}
  document.getElementById("responsesBody").innerHTML="";
  lastHistoryJson = "";
}

/* ================= CLEAR FIELDS ================= */
function clearFields(){
  document.getElementById("message").value="";
  document.getElementById("b1").value="";
  document.getElementById("b2").value="";
  document.getElementById("b3").value="";
}

/* ================= MQTT ================= */
let client=null;

function startMqtt(){
  document.getElementById("title").value="Dad Chat";

  const cached=loadCachedHistory();
  if(cached) {
    renderHistory(cached);
    lastHistoryJson = JSON.stringify(cached);
  }

  applySavedRequest();

  if(typeof mqtt==="undefined"){
    STATUS("ERROR: mqtt library did not load.");
    return;
  }

  STATUS("Connecting to HiveMQ…");
  client=mqtt.connect(brokerUrl, options);

  client.on("connect", ()=>{
    STATUS("Connected ✅");
    client.subscribe(topicOnline,  {qos:1});
    client.subscribe(topicRequest, {qos:1});
    client.subscribe(topicHistory, {qos:1});
  });

  client.on("reconnect", ()=>STATUS("Reconnecting…"));
  client.on("offline", ()=>STATUS("Offline (browser)"));
  client.on("close", ()=>STATUS("Disconnected"));
  client.on("error", (err)=>STATUS("Error: " + (err?.message || err)));

  client.on("message",(topic,msg)=>{
    const raw=msg.toString();

    if(topic===topicOnline){
      setDeviceStatus(raw.trim().toLowerCase()==="online");
      return;
    }

    if(topic===topicRequest){
      if(raw.trim().length===0){
        try{ localStorage.removeItem(REQ_KEY);}catch(e){}
        hideRequestBanner();
        return;
      }

      let ts=Date.now();
      try{
        const j=JSON.parse(raw);
        if(j && j.epochMs && Number(j.epochMs)>0) ts=Number(j.epochMs);
      }catch(e){}

      saveRequest(ts);
      showRequestBanner(ts);
      notify("Dad Chat", "Dad requested a message");
      return;
    }

    if(topic===topicHistory){
      try{
        const arr=JSON.parse(raw);
        if(Array.isArray(arr)){
          const incomingJson = JSON.stringify(arr);

          if(lastHistoryJson && incomingJson !== lastHistoryJson){
            const newest = arr[0];
            if(newest && newest.a){
              notify("Dad Chat Response", newest.a);
            } else {
              notify("Dad Chat", "New response received");
            }
          }

          lastHistoryJson = incomingJson;
          cacheHistory(arr);
          renderHistory(arr);
        }
      }catch(e){
        STATUS("History JSON parse error");
      }
      return;
    }
  });
}

/* ================= SEND ================= */
function send(){
  if(!client || !client.connected){
    STATUS("Not connected");
    return;
  }

  const title=document.getElementById("title").value || "";
  const msg=document.getElementById("message").value || "";
  const b1=document.getElementById("b1").value || "";
  const b2=document.getElementById("b2").value || "";
  const b3=document.getElementById("b3").value || "";

  client.publish(topicTitle,   title,               {qos:1, retain:true});
  client.publish(topicMessage, msg,                 {qos:1, retain:true});
  client.publish(topicButtons, `${b1}|${b2}|${b3}`, {qos:1, retain:true});

  client.publish(topicRequest, "", {qos:1, retain:true});
  try{ localStorage.removeItem(REQ_KEY);}catch(e){}
  hideRequestBanner();

  STATUS("Sent ✅");
}
</script>

</body>
</html>
